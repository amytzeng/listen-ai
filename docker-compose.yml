services:
  stat:
    build:
      context: ./stat
      dockerfile: Dockerfile
    image: listenai-stat
    ports:
      - "8002:8002"
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: "/data/listenai.db"
    volumes:
      - ./data/listenai.db:/data/listenai.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  nlp:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    image: listenai-nlp
    ports:
      - "18001:8001"
    environment:
      NLP_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: listenai-gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: "http://stat:8002"
      NLP_URL: "http://nlp:8001"
      JWT_SECRET: "supersecret"
      DEMO_USER: "admin"
      DEMO_PASS: "admin123"
    depends_on:
      stat:
        condition: service_healthy
      nlp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: listenai-frontend
    ports:
      - "8501:8501"
    environment:
      GATEWAY_URL: "http://gateway:8000"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped